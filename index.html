<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание смен на июль 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #ced4da;
            
            /* Пастельная палитра для смен */
            --pastel-blue: #e3f2fd;   /* Вечерняя */
            --border-blue: #90caf9;
            --pastel-orange: #ffe0b2; /* Дневная */
            --border-orange: #ffb74d;
            --pastel-pink: #f8bbd0;   /* Свой вариант */
            --border-pink: #f06292;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        /* Стили для всплывающего уведомления (Toast) */
        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.26, 1.55);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: center;
        }
        .toast.show {
            top: 25px;
        }
        .toast.success {
            background-color: #2ecc71;
        }
        .toast.error {
            background-color: #e74c3c;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .input-title {
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            font-size: 16px;
        }

        .code-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
            max-width: 340px;
        }

        select, input {
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
        }

        .prefix-select {
            width: 85px;
            background-color: #fff;
            cursor: pointer;
        }

        .digits-input {
            flex: 1;
        }

        .digits-input.invalid {
            border-color: var(--danger-color);
            background-color: #fff5f5;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 8px;
            display: none;
            font-weight: 700;
        }

        .main-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        button {
            padding: 14px 22px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:disabled {
            background-color: #e0e0e0 !important;
            color: #9e9e9e !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            flex: 1;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
            flex: 1;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            width: 100%;
            margin-top: 30px;
            padding: 16px;
            font-size: 18px;
            font-weight: 800;
        }

        #calendar-section {
            display: none;
            margin-top: 30px;
            border-top: 2px solid #edf2f7;
            padding-top: 25px;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 800;
            margin-bottom: 12px;
            background-color: #edf2f7;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 15px;
            color: #4a5568;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .calendar-day {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 12px;
            min-height: 135px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        .calendar-day.empty {
            background-color: #f8f9fa;
            border: none;
        }

        /* Цвета фонов в зависимости от типа смены */
        .calendar-day.shift-day {
            background-color: var(--pastel-orange);
            border-color: var(--border-orange);
        }

        .calendar-day.shift-evening {
            background-color: var(--pastel-blue);
            border-color: var(--border-blue);
        }

        .calendar-day.shift-custom {
            background-color: var(--pastel-pink);
            border-color: var(--border-pink);
        }

        /* Огромные скругленные числа для десктопа */
        .day-number {
            font-weight: 800;
            font-size: 42px;
            line-height: 0.85;
            color: var(--text-color);
            margin-bottom: 10px;
            letter-spacing: -1.5px;
        }

        .day-controls {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .shift-select {
            width: 100%;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 6px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            margin-top: 5px;
            background-color: #fff;
            color: var(--text-color);
            cursor: pointer;
        }

        .custom-time-container {
            margin-top: 8px;
        }

        .custom-time-inputs {
            display: flex;
            align-items: center;
            gap: 3px;
            justify-content: start;
        }

        .time-part {
            width: 36px;
            padding: 4px 2px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 6px;
        }

        .time-divider {
            font-size: 14px;
            font-weight: 800;
            color: #718096;
        }

        .loader {
            display: none;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-color);
            margin: 25px 0;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .calendar-header {
                display: none;
            }
            .calendar-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .calendar-day {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                min-height: auto;
                padding: 14px 16px;
                border-radius: 14px;
            }
            .calendar-day.empty {
                display: none;
            }
            /* Возвращаем адекватный размер шрифта для телефона */
            .day-number {
                font-size: 22px;
                letter-spacing: normal;
                margin-bottom: 0;
            }
            .day-number::after {
                content: " " attr(data-weekday);
                font-weight: 600;
                color: #718096;
                font-size: 14px;
                margin-left: 4px;
            }
            .day-controls {
                width: auto;
                align-items: flex-end;
                max-width: 220px;
            }
            .shift-select {
                margin-top: 0;
                font-size: 14px;
                padding: 8px 10px;
            }
            .custom-time-container {
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">
    <h2>Расписание смен на июль 2026</h2>
    
    <div class="form-group">
        <span class="input-title">Введите ваш код:</span>
        <div class="code-input-container">
            <select id="prefix-select" class="prefix-select">
                <option value="к">к</option>
                <option value="в">в</option>
            </select>
            <input type="text" id="digits-input" class="digits-input" placeholder="Три цифры" inputmode="numeric" maxlength="5">
        </div>
        <div id="error-message" class="error-message">Введите код, состоящий из трёх цифр, вуф 🐺</div>
    </div>

    <div class="main-buttons">
        <button id="btn-july" class="btn-primary" disabled>Смены в июле</button>
        <button id="btn-booking" class="btn-secondary" disabled>Абоненты по записи</button>
    </div>

    <div id="loader" class="loader">Загрузка календаря... Пожалуйста, подождите ⏳</div>

    <div id="calendar-section">
        <div class="calendar-header">
            <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
        <button id="btn-save" class="btn-success">Сохранить изменения в Таблицу</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPTujjJfHkRNuE-_chKl0kYxxE-usLak1KzTmTRtaRC2llT6bIu-fkUVdhXlddbys5/exec";

    const digitsInput = document.getElementById('digits-input');
    const prefixSelect = document.getElementById('prefix-select');
    const errorMessage = document.getElementById('error-message');
    const btnJuly = document.getElementById('btn-july');
    const btnBooking = document.getElementById('btn-booking');
    const calendarSection = document.getElementById('calendar-section');
    const calendarGrid = document.getElementById('calendar-grid');
    const loader = document.getElementById('loader');
    const btnSave = document.getElementById('btn-save');
    const toast = document.getElementById('toast');

    let currentFullCode = "";
    let toastTimeout;

    // Функция показа красивых уведомлений
    function showToast(message, type = 'success') {
        clearTimeout(toastTimeout);
        toast.className = `toast ${type}`;
        toast.innerHTML = message;
        toast.classList.add('show');
        
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 3500);
    }

    // Интерактивная валидация ввода
    digitsInput.addEventListener('input', () => {
        const val = digitsInput.value.trim();
        if (/^\d{3}$/.test(val)) {
            digitsInput.classList.remove('invalid');
            errorMessage.style.display = 'none';
            btnJuly.disabled = false;
            btnBooking.disabled = false;
            updateFullCode();
        } else {
            digitsInput.classList.add('invalid');
            errorMessage.style.display = 'block';
            btnJuly.disabled = true;
            btnBooking.disabled = true;
        }
    });

    prefixSelect.addEventListener('change', updateFullCode);

    function updateFullCode() {
        currentFullCode = prefixSelect.value + "-" + digitsInput.value.trim();
    }

    btnJuly.addEventListener('click', () => {
        loader.style.display = 'block';
        calendarSection.style.display = 'none';
        
        fetch(`${WEB_APP_URL}?action=getData&code=${encodeURIComponent(currentFullCode)}`)
            .then(res => res.json())
            .then(data => {
                loader.style.display = 'none';
                if(data.error) {
                    showToast('Ошибка сервера: ' + data.error, 'error');
                    return;
                }
                renderJuly2026(data.schedule || {});
                calendarSection.style.display = 'block';
                calendarSection.scrollIntoView({ behavior: 'smooth' });
            })
            .catch(err => {
                loader.style.display = 'none';
                showToast('Не удалось связаться с Google Таблицей 🔌', 'error');
                console.error(err);
            });
    });

    // Функция обновления цвета ячейки
    function updateCellVisuals(cellElement, shiftValue) {
        cellElement.classList.remove('shift-day', 'shift-evening', 'shift-custom');
        if (!shiftValue) return;

        if (shiftValue === "14:00 — 18:00") {
            cellElement.classList.add('shift-day');
        } else if (shiftValue === "18:00 — 22:00" || shiftValue === "18:00 -- 22:00") {
            cellElement.classList.add('shift-evening');
        } else {
            cellElement.classList.add('shift-custom');
        }
    }

    // Динамическая сборка сетки календаря
    function renderJuly2026(schedule) {
        calendarGrid.innerHTML = '';
        
        const totalDays = 31;
        const firstDayIndex = new Date(2026, 6, 1).getDay(); 
        const startOffset = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 
        
        const weekdays = ["ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ", "ВС"];
        
        // Вставка пустых блоков
        for (let i = 0; i < startOffset; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'calendar-day empty';
            calendarGrid.appendChild(emptyCell);
        }
        
        // Генерация 31 дня
        for (let day = 1; day <= totalDays; day++) {
            const dayStr = (day < 10 ? '0' + day : day) + '.07';
            const weekdayName = weekdays[(startOffset + day - 1) % 7];
            
            const dayCell = document.createElement('div');
            dayCell.className = 'calendar-day';
            dayCell.id = `cell-${dayStr}`;
            
            const savedValue = schedule[dayStr] || "";
            updateCellVisuals(dayCell, savedValue);
            
            const isDayPreset = savedValue === "14:00 — 18:00";
            const isEveningPreset = savedValue === "18:00 — 22:00" || savedValue === "18:00 -- 22:00";
            const isCustom = savedValue !== "" && !isDayPreset && !isEveningPreset;
            
            let h1="", m1="", h2="", m2="";
            if (isCustom) {
                const pieces = savedValue.split(/[-—]/);
                if (pieces.length === 2) {
                    const t1 = pieces[0].trim().split(':');
                    const t2 = pieces[1].trim().split(':');
                    if (t1.length === 2) { h1 = t1[0]; m1 = t1[1]; }
                    if (t2.length === 2) { h2 = t2[0]; m2 = t2[1]; }
                }
            }
            
            dayCell.innerHTML = `
                <div class="day-number" data-weekday="(${weekdayName})">${day}</div>
                <div class="day-controls">
                    <select class="shift-select" data-date="${dayStr}" onchange="onShiftSelectChange(this)">
                        <option value="">-- Выбрать --</option>
                        <option value="14:00 — 18:00" ${isDayPreset ? 'selected' : ''}>Дневная (14:00 — 18:00)</option>
                        <option value="18:00 — 22:00" ${isEveningPreset ? 'selected' : ''}>Вечерняя (18:00 — 22:00)</option>
                        <option value="custom" ${isCustom ? 'selected' : ''}>Свой вариант</option>
                    </select>
                    
                    <div class="custom-time-container" id="custom-wrap-${dayStr}" style="display: ${isCustom ? 'block' : 'none'};">
                        <div class="custom-time-inputs">
                            <input type="text" class="time-part" id="h1-${dayStr}" maxlength="2" placeholder="ЧЧ" value="${h1}">:
                            <input type="text" class="time-part" id="m1-${dayStr}" maxlength="2" placeholder="ММ" value="${m1}">
                            <span class="time-divider">—</span>
                            <input type="text" class="time-part" id="h2-${dayStr}" maxlength="2" placeholder="ЧЧ" value="${h2}">:
                            <input type="text" class="time-part" id="m2-${dayStr}" maxlength="2" placeholder="ММ" value="${m2}">
                        </div>
                    </div>
                </div>
            `;
            
            calendarGrid.appendChild(dayCell);
        }
    }

    // Обработчик переключения селектора смен
    window.onShiftSelectChange = function(select) {
        const dateStr = select.getAttribute('data-date');
        const customContainer = document.getElementById(`custom-wrap-${dateStr}`);
        const cell = document.getElementById(`cell-${dateStr}`);
        
        if (select.value === 'custom') {
            customContainer.style.display = 'block';
        } else {
            customContainer.style.display = 'none';
        }
        
        // Мгновенное перекрашивание ячейки при выборе
        updateCellVisuals(cell, select.value);
    };

    // Отправка данных на запись
    btnSave.addEventListener('click', () => {
        loader.style.display = 'block';
        btnSave.disabled = true;
        
        const shiftsPackage = {};
        const allSelects = document.querySelectorAll('.shift-select');
        
        allSelects.forEach(select => {
            const dateStr = select.getAttribute('data-date');
            const mode = select.value;
            
            if (mode === "") {
                shiftsPackage[dateStr] = ""; 
            } else if (mode === "14:00 — 18:00" || mode === "18:00 — 22:00") {
                shiftsPackage[dateStr] = mode;
            } else if (mode === "custom") {
                const h1 = document.getElementById(`h1-${dateStr}`).value.trim();
                const m1 = document.getElementById(`m1-${dateStr}`).value.trim();
                const h2 = document.getElementById(`h2-${dateStr}`).value.trim();
                const m2 = document.getElementById(`m2-${dateStr}`).value.trim();
                
                if (!h1 && !m1 && !h2 && !m2) {
                    shiftsPackage[dateStr] = "";
                } else {
                    const formattedH1 = h1.padStart(2, '0');
                    const formattedM1 = m1.padStart(2, '0');
                    const formattedH2 = h2.padStart(2, '0');
                    const formattedM2 = m2.padStart(2, '0');
                    shiftsPackage[dateStr] = `${formattedH1}:${formattedM1} — ${formattedH2}:${formattedM2}`;
                }
            }
        });

        fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
                code: currentFullCode,
                shifts: shiftsPackage
            })
        })
        .then(res => res.json())
        .then(data => {
            loader.style.display = 'none';
            btnSave.disabled = false;
            if (data.success) {
                showToast('Данные успешно сохранены, ауф!', 'success');
                btnJuly.click(); // Фоновое обновление данных
            } else {
                showToast('Ошибка: Сотрудник с таким кодом не найден.', 'error');
            }
        })
        .catch(err => {
            loader.style.display = 'none';
            btnSave.disabled = false;
            showToast('Сбой при сохранении данных ❌', 'error');
            console.error(err);
        });
    });
</script>
</body>
</html>
