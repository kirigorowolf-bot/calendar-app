<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание смен на июль 2026</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --info-color: #17a2b8;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #ced4da;
            
            /* Пастельная палитра для смен */
            --pastel-blue: #e3f2fd;   
            --border-blue: #90caf9;
            --pastel-orange: #ffe0b2; 
            --border-orange: #ffb74d;
            --pastel-pink: #cbf8bb;   
            --border-pink: #62f08f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; display: flex; justify-content: center; }

        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
            border-radius: 50px; color: white; font-weight: 700; font-size: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); transition: top 0.4s cubic-bezier(0.68, -0.55, 0.26, 1.55); z-index: 9999;
            display: flex; align-items: center; gap: 10px; text-align: center;
        }
        .toast.show { top: 25px; }
        .toast.success { background-color: #2ecc71; }
        .toast.error { background-color: #e74c3c; }

        .container { width: 100%; max-width: 1000px; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        h2 { margin-bottom: 20px; font-size: 24px; font-weight: 800; color: var(--text-color); }
        .form-group { margin-bottom: 15px; }
        .input-title { font-weight: 700; margin-bottom: 8px; display: block; font-size: 16px; }
        .code-input-container { display: flex; gap: 10px; align-items: center; width: 100%; max-width: 340px; }
        
        select, input { padding: 12px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 16px; font-weight: 600; outline: none; transition: border-color 0.2s; }
        select:focus, input:focus { border-color: var(--primary-color); }
        .prefix-select { width: 85px; background-color: #fff; cursor: pointer; }
        .digits-input { flex: 1; }
        .digits-input.invalid { border-color: var(--danger-color); background-color: #fff5f5; }
        .error-message { color: var(--danger-color); font-size: 14px; margin-top: 8px; display: none; font-weight: 700; }

        .main-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        button { padding: 14px 22px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; flex: 1; min-width: 150px; }
        button:disabled { background-color: #e0e0e0 !important; color: #9e9e9e !important; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        button:active:not(:disabled) { transform: translateY(0); }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-info { background-color: var(--info-color); color: white; }
        .btn-secondary { background-color: #94d3f2; color: white; }
        .btn-success { background-color: var(--success-color); color: white; width: 100%; margin-top: 30px; padding: 16px; font-size: 18px; font-weight: 800; display: none; }

        .admin-warning { display: none; background-color: #fff3cd; border: 2px solid #ffeeba; color: #856404; padding: 12px 16px; border-radius: 12px; font-weight: 700; margin-bottom: 15px; font-size: 15px; text-align: center; }

        #calendar-section { display: none; margin-top: 30px; border-top: 2px solid #edf2f7; padding-top: 25px; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: 800; margin-bottom: 12px; background-color: #edf2f7; padding: 12px 0; border-radius: 12px; font-size: 15px; color: #4a5568; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; position: relative; }
        .calendar-day { border: 2px solid #e2e8f0; border-radius: 16px; min-height: 80px; display: flex; justify-content: center; align-items: center; background-color: #fff; transition: all 0.2s; cursor: pointer; position: relative; }
        .calendar-day.empty { background-color: transparent; border: none; cursor: default; }
        .calendar-day.selected { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0,123,255,0.2); transform: scale(1.03); z-index: 10; }
        
        .calendar-day.shift-day { background-color: var(--pastel-orange); border-color: var(--border-orange); }
        .calendar-day.shift-evening { background-color: var(--pastel-blue); border-color: var(--border-blue); }
        .calendar-day.shift-custom { background-color: var(--pastel-pink); border-color: var(--border-pink); }
        .calendar-day.critical-border { border: 3px solid #8b0000 !important; box-shadow: inset 0 0 4px rgba(139,0,0,0.2); }
        
        .day-number-tl { position: absolute; top: 6px; left: 8px; font-weight: 800; font-size: 13px; color: #718096; line-height: 1; }
        .psy-counters { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin-top: 14px; }
        .counter-column { display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .counter-icon { font-size: 13px; margin-bottom: 3px; }
        .counter-num { font-size: 20px; font-weight: 800; color: var(--text-color); }
        .counter-slash { font-size: 20px; color: #cbd5e1; font-weight: 400; line-height: 1; }
        
        .expanded-panel { grid-column: 1 / -1; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 12px 18px; margin: 4px 0 10px 0; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.06); animation: slideDown 0.2s ease-out; }
        .expanded-panel.active { display: block; }
        
        .desktop-popover { position: absolute; top: 102%; left: 50%; transform: translateX(-50%); background: #ffffff; border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 110; min-width: 210px; cursor: default; }
        .panel-title { font-size: 15px; font-weight: 800; margin-bottom: 8px; color: var(--primary-color); border-bottom: 1px dashed #edf2f7; padding-bottom: 4px; }
        .panel-controls { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .shift-select { width: 100%; font-size: 14px; padding: 8px; border-radius: 8px; border: 2px solid var(--border-color); background-color: #fff; cursor: pointer; }
        .custom-time-inputs { display: flex; align-items: center; justify-content: center; gap: 4px; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .time-part { width: 40px; padding: 5px 3px; font-size: 13px; text-align: center; border: 2px solid var(--border-color); border-radius: 6px; }
        .time-divider { font-size: 13px; font-weight: 800; color: #718096; }
        
        .general-details-list { display: flex; flex-direction: column; gap: 10px; }
        .details-section { background: #f8f9fa; padding: 10px 14px; border-radius: 10px; border: 1px solid #edf2f7; }
        .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; color: #2c3e50; margin-bottom: 6px; border-bottom: 2px solid #e2e8f0; padding-bottom: 3px; }
        .role-group { margin-bottom: 4px; font-size: 14px; }
        .role-label { font-weight: 800; color: #718096; display: block; margin-bottom: 2px; }
        .role-list { list-style: none; padding-left: 0; }
        
        /* СТИЛИ ДЛЯ АБОНЕНТОВ В ОБЩЕМ РАСПИСАНИИ */
        .psy-list-item { margin-bottom: 12px; }
        .psy-main-info { font-weight: 700; color: #2d3748; display: inline-block; }
        .role-time { color: #718096; font-size: 13px; font-weight: 700; margin-left: 5px; }
        
        .read-only-bookings { display: inline; margin-left: 8px; color: #4a5568; font-size: 13px; font-weight: 700; }
        .b-item { background: #e3f2fd; padding: 2px 6px; border-radius: 6px; border: 1px solid #90caf9; display: inline-block; margin: 2px 0; color: #1e3a8a; }
        .b-arrow { margin: 0 4px; color: #94a3b8; font-size: 12px; }
        .editable-bookings-container { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; margin-left: 10px; border-left: 2px solid var(--primary-color); padding-left: 10px; }

        .cell-shift-time { font-size: 11px; font-weight: 800; margin-top: 16px; text-align: center; color: #1e293b; line-height: 1.1; padding: 0 2px; }
        .loader { display: none; text-align: center; font-size: 18px; font-weight: 800; color: var(--primary-color); margin: 25px 0; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .booking-counter { font-size: 14px; font-weight: 800; color: var(--primary-color); background: #e3f2fd; padding: 2px 8px; border-radius: 10px; margin-top: 5px; }
        
        .booking-row { display: flex !important; gap: 5px !important; margin-bottom: 6px !important; align-items: center !important; flex-wrap: nowrap !important; background: #ffffff !important; padding: 4px 8px !important; border-radius: 8px !important; border: 1px solid #e2e8f0 !important; width: 100% !important; box-sizing: border-box !important; }
        .booking-input { padding: 6px 4px !important; height: 32px !important; border: 2px solid #cbd5e1 !important; border-radius: 6px !important; font-size: 14px !important; font-weight: 600 !important; outline: none !important; text-align: center !important; box-sizing: border-box !important; flex: none !important; }
        .booking-input:focus { border-color: var(--primary-color) !important; }

        .b-hh, .b-mm { width: 38px !important; max-width: 38px !important; }
        .b-name { flex: 1 !important; text-align: left !important; padding-left: 8px !important; }
        .b-age { width: 60px !important; max-width: 60px !important; }
        .booking-row span { font-weight: 800 !important; color: #94a3b8 !important; font-size: 14px !important; flex: none !important; user-select: none !important; }

/* ========================================= */
        /* СТИЛИ ДЛЯ СТРОКИ АБОНЕНТОВ В ОБЩЕМ РАСПИСАНИИ */
        /* ========================================= */
        .editable-bookings-container.row-mode {
            display: inline-flex !important;
            flex-direction: row !important;
            flex-wrap: wrap !important;
            align-items: center !important;
            gap: 3px !important;
            border-left: none !important;
            padding-left: 0 !important;
            margin-left: 8px !important;
            margin-top: 0 !important;
            vertical-align: middle;
        }

        .row-mode .booking-row {
            display: inline-flex !important;
            flex-direction: row !important;
            align-items: center !important;
            background: #e3f2fd !important; /* Голубая таблетка */
            border: 1px solid #90caf9 !important;
            border-radius: 6px !important;
            padding: 2px 3px !important;
            margin: 0 !important;
            width: auto !important;
            min-height: 26px !important;
        }

        .row-mode .booking-row span {
            color: #1e3a8a !important;
            font-weight: 700 !important;
            font-size: 13px !important;
            margin: 0 1px !important;
        }

        /* Делаем инпуты невидимыми и вписываем их в таблетку */
        .row-mode .booking-input {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px dashed #90caf9 !important;
            padding: 0 !important;
            margin: 0 2px !important;
            height: auto !important;
            font-size: 13px !important;
            color: #1e3a8a !important;
            font-weight: 700 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        .row-mode .booking-input:focus {
            border-bottom: 1px solid #1e3a8a !important;
        }

        /* Жесткая ширина полей, чтобы всё влезло в строку */
        .row-mode .b-hh, { width: 16px !important; min-width: 16px !important; max-width: 16px !important; text-align: center !important; margin-right: 0px !important;}
        .row-mode .b-mm { width: 16px !important; min-width: 16px !important; max-width: 16px !important; text-align: center !important; margin-left: 0px !important;}
        .row-mode .b-name { width: 50px !important; min-width: 50px !important; max-width: 50px !important; text-align: center !important; }
        .row-mode .b-age { width: 16px !important; min-width: 16px !important; max-width: 16px !important; text-align: center !important; }

        .row-mode .b-arrow {
            color: #94a3b8;
            font-size: 12px;
            margin: 0 2px;
        }
        
        @media (max-width: 768px) {
            body { padding: 8px; }
            .container { padding: 12px; border-radius: 12px; width: 100%; overflow: hidden; box-sizing: border-box; }
            .code-input-container { max-width: 100%; width: 100%; display: flex; gap: 8px; }
            .prefix-select { width: 75px; min-width: 75px; padding: 10px; }
            .digits-input { width: 100%; min-width: 0; padding: 10px; flex: 1; }

            .calendar-header { display: grid; font-size: 11px; padding: 8px 0; margin-bottom: 8px; border-radius: 8px; }
            .calendar-grid { gap: 6px; }
            .calendar-day { min-height: 55px; border-width: 1px; border-radius: 10px; }
            .cell-shift-time { font-size: 9px; margin-top: 12px; }
            .day-number-tl, .day-number { font-size: 10px !important; top: 3px !important; left: 5px !important; }
            .psy-counters { margin-top: 14px; gap: 2px; }
            .counter-icon { font-size: 9px; margin-bottom: 1px; }
            .counter-num { font-size: 12px; }
            .counter-slash { font-size: 12px; color: rgba(44, 62, 80, 0.3); }
            .booking-counter { font-size: 12px !important; padding: 2px 6px !important; margin-top: 8px !important; }

            .booking-row { padding: 4px 6px !important; gap: 4px !important; display: flex !important; align-items: center !important; }
            .b-name { min-width: 0 !important; flex: 1 !important; font-size: 13px !important; padding: 4px !important; }
            .b-age { width: 50px !important; max-width: 50px !important; font-size: 13px !important; padding: 4px !important; }
            .b-hh, .b-mm { width: 32px !important; max-width: 32px !important; font-size: 13px !important; padding: 4px !important; }

            /* Мобильная адаптация абонентов в Общем расписании */
            .read-only-bookings { display: flex; flex-direction: column; margin-left: 10px; margin-top: 4px; border-left: 2px solid #cbd5e1; padding-left: 8px; }
            .b-item { border: none; background: transparent; padding: 0; display: block; margin: 2px 0; font-size: 13px; color: #334155; }
            .b-arrow { display: none; }
            .editable-bookings-container { margin-left: 4px; padding-left: 6px; }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>
<div class="container">
    <h2>Расписание на июль 2026</h2>
    
    <div class="form-group">
        <span class="input-title">Введите ваш код:</span>
        <div class="code-input-container">
            <select id="prefix-select" class="prefix-select">
                <option value="к">к</option>
                <option value="в">в</option>
                <option value="а">а</option>
            </select>
            <input type="text" id="digits-input" class="digits-input" placeholder="Три цифры" inputmode="numeric" maxlength="5">
        </div>
        <div id="error-message" class="error-message">Введите код, состоящий из трёх цифр, вуф 🐺</div>
    </div>
    
    <div class="main-buttons">
        <button id="btn-july" class="btn-primary" disabled>Смены в июле</button>
        <button id="btn-general" class="btn-info" disabled>Общее расписание</button>
        <button id="btn-booking" class="btn-secondary" disabled>Абоненты по записи</button>
    </div>
    
    <div id="loader" class="loader">Загрузка календаря... Пожалуйста, подождите ⏳</div>
    
    <div id="calendar-section">
        <div id="admin-warning" class="admin-warning">Для внесения изменений обратитесь к администратору.</div>
        
        <div id="analyst-search-bar" style="display: none; margin-bottom: 20px; background: #fff3cd; padding: 12px; border-radius: 12px; border: 1px solid #ffeeba;">
            <span class="input-title" style="font-size: 15px; color: #856404; margin-bottom: 6px;">Вывести расписание конкретного психолога:</span>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="global-expert-input" class="booking-input" placeholder="Ник или код" style="flex: 1; text-align: left; padding-left: 12px; height: 42px !important; background: #fff;">
                <button id="btn-global-load-expert" class="btn-primary" style="min-width: auto; padding: 0 25px; height: 42px; font-size: 15px; border-radius: 10px;">Показать</button>
            </div>
        </div>
        
        <div class="calendar-header">
            <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
        <button id="btn-save" class="btn-success">Сохранить</button>
    </div>
</div>

<div id="expanded-panel" class="expanded-panel">
    <div id="panel-content"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPTujjJfHkRNuE-_chKl0kYxxE-usLak1KzTmTRtaRC2llT6bIu-fkUVdhXlddbys5/exec";
    const digitsInput = document.getElementById('digits-input');
    const prefixSelect = document.getElementById('prefix-select');
    const errorMessage = document.getElementById('error-message');
    const btnJuly = document.getElementById('btn-july');
    const btnGeneral = document.getElementById('btn-general');
    const btnBooking = document.getElementById('btn-booking');
    const calendarSection = document.getElementById('calendar-section');
    const calendarGrid = document.getElementById('calendar-grid');
    const loader = document.getElementById('loader');
    const btnSave = document.getElementById('btn-save');
    const toast = document.getElementById('toast');
    const adminWarning = document.getElementById('admin-warning');

    const expandedPanel = document.getElementById('expanded-panel');
    const panelContent = document.getElementById('panel-content');
    
    let currentFullCode = "";
    let toastTimeout;
    let currentViewMode = "personal";

    let pendingShifts = {};
    let globalGeneralData = {};
    let allGridElements = [];

    function showToast(message, type = 'success') {
        clearTimeout(toastTimeout);
        toast.className = `toast ${type}`;
        toast.innerHTML = message;
        toast.classList.add('show');
        toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }
    
    digitsInput.addEventListener('input', () => {
        const val = digitsInput.value.trim();
        if (/^\d{3}$/.test(val)) {
            digitsInput.classList.remove('invalid');
            errorMessage.style.display = 'none';
            btnJuly.disabled = false;
            btnGeneral.disabled = false;
            btnBooking.disabled = false;
            updateFullCode();
        } else {
            digitsInput.classList.add('invalid');
            errorMessage.style.display = 'block';
            btnJuly.disabled = true;
            btnGeneral.disabled = true;
            btnBooking.disabled = true;
        }
    });
    
    prefixSelect.addEventListener('change', updateFullCode);

    function updateFullCode() { currentFullCode = prefixSelect.value + "-" + digitsInput.value.trim(); }
    
    btnJuly.addEventListener('click', () => {
        currentViewMode = "personal";
        const p = prefixSelect.value.toLowerCase();
        document.getElementById('analyst-search-bar').style.display = 'none';

        if(p === 'к') {
            btnSave.style.display = 'none';
            adminWarning.style.display = 'block';
        } else {
            btnSave.style.display = 'block';
            adminWarning.style.display = 'none';
        }
        expandedPanel.classList.remove('active');
        removeDesktopPopover();
        
        loadCalendarData(`${WEB_APP_URL}?action=getGeneralData&code=${encodeURIComponent(currentFullCode)}`);
    });
    
    btnGeneral.addEventListener('click', () => {
        currentViewMode = "general";
        const p = prefixSelect.value.toLowerCase();
        
        // Аналитику разрешаем сохранять из Общего расписания
        btnSave.style.display = (p === 'а') ? 'block' : 'none';
        adminWarning.style.display = 'none';

        document.getElementById('analyst-search-bar').style.display = 'none';
        expandedPanel.classList.remove('active');
        removeDesktopPopover();
        
        loadCalendarData(`${WEB_APP_URL}?action=getGeneralData&code=${encodeURIComponent(currentFullCode)}`);
    });
    
    btnBooking.addEventListener('click', () => {
        currentViewMode = "booking";
        btnSave.style.display = 'block';
        adminWarning.style.display = 'none';
        expandedPanel.classList.remove('active');
        removeDesktopPopover();

        const isAnalyst = prefixSelect.value.toLowerCase() === 'а';
        const searchBar = document.getElementById('analyst-search-bar');

        if (isAnalyst) {
            searchBar.style.display = 'block';
            calendarGrid.innerHTML = '';
            calendarSection.style.display = 'block';
            calendarSection.scrollIntoView({ behavior: 'smooth' });
        } else {
            searchBar.style.display = 'none';
            loadCalendarData(`${WEB_APP_URL}?action=getBookingData&code=${encodeURIComponent(currentFullCode)}`);
        }
    });
    
    function removeDesktopPopover() {
        const oldPopover = document.getElementById('desktop-personal-popover');
        if (oldPopover) oldPopover.remove();
    }
    
    function loadCalendarData(url) {
        loader.style.display = 'block';
        calendarSection.style.display = 'none';
        fetch(url)
            .then(res => res.json())
            .then(data => {
                loader.style.display = 'none';
                if(data.error) {
                    showToast('Ошибка сервера: ' + data.error, 'error');
                    return;
                }
                pendingShifts = data.schedule || {};
                globalGeneralData = data.generalData || {};

                renderGrid();
                calendarSection.style.display = 'block';
                calendarSection.scrollIntoView({ behavior: 'smooth' });
            })
            .catch(err => {
                loader.style.display = 'none';
                showToast('Не удалось связаться с Google Таблицей', 'error');
                console.error(err);
            });
    }
    
    function updateCellVisuals(cellElement, shiftValue) {
        cellElement.classList.remove('shift-day', 'shift-evening', 'shift-custom');
        if (!shiftValue) return;
        if (shiftValue === "14:00 — 18:00") cellElement.classList.add('shift-day');
        else if (shiftValue === "18:00 — 22:00" || shiftValue === "18:00 -- 22:00") cellElement.classList.add('shift-evening');
        else cellElement.classList.add('shift-custom');
    }
    
    function renderGrid() {
        calendarGrid.innerHTML = '';
        allGridElements = [];
        document.body.appendChild(expandedPanel);

        const totalDays = 31;
        const firstDayIndex = new Date(2026, 6, 1).getDay();
        const startOffset = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

        for (let i = 0; i < startOffset; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'calendar-day empty';
            calendarGrid.appendChild(emptyCell);
            allGridElements.push(emptyCell);
        }

        const p = prefixSelect.value.toLowerCase();

        for (let day = 1; day <= totalDays; day++) {
            const dayStr = (day < 10 ? '0' + day : day) + '.07';
            const cell = document.createElement('div');
            cell.className = 'calendar-day';
            cell.id = `cell-${dayStr}`;

            const userShift = pendingShifts[dayStr] || "";
            const info = globalGeneralData[dayStr] || { dayPsychologists: [], eveningPsychologists: [], vDayCount: 0, vEveningCount: 0 };
            const dayBookings = globalGeneralData.bookings ? (globalGeneralData.bookings[dayStr] || []) : [];

            const dayCount = info.dayPsychologists ? info.dayPsychologists.length : 0;
            const eveningCount = info.eveningPsychologists ? info.eveningPsychologists.length : 0;

            if (currentViewMode === "booking") {
                cell.innerHTML = `<div class="day-number-tl">${day}</div>`;
                updateCellVisuals(cell, userShift);
                if (dayBookings.length > 0) {
                    const bCount = document.createElement('div');
                    bCount.className = 'booking-counter';
                    bCount.innerText = `👥 ${dayBookings.length}`;
                    cell.appendChild(bCount);
                }
            } else if (currentViewMode === "general") {
                cell.innerHTML = `
                    <div class="day-number-tl">${day}</div>
                    <div class="psy-counters">
                        <div class="counter-column"><span class="counter-icon">☀️</span><span class="counter-num">${dayCount}</span></div>
                        <span class="counter-slash">/</span>
                        <div class="counter-column"><span class="counter-icon">🌙</span><span class="counter-num">${eveningCount}</span></div>
                    </div>
                `;
                updateCellVisuals(cell, userShift);
                if (p === 'в' && (dayCount === 0 || eveningCount === 0)) cell.classList.add('critical-border');
                else if (p === 'а' && (info.vDayCount === 0 || info.vEveningCount === 0)) cell.classList.add('critical-border');
                else if (p === 'к' && (dayCount !== 2 || eveningCount !== 2)) cell.classList.add('critical-border');
            } else {
                let shiftText = userShift ? `<div class="cell-shift-time">${userShift}</div>` : '';
                cell.innerHTML = `<div class="day-number-tl">${day}</div>${shiftText}`;
                updateCellVisuals(cell, userShift);
                if (p === 'в' && (dayCount === 0 || eveningCount === 0)) cell.classList.add('critical-border');
                else if (p === 'к' && (dayCount !== 2 || eveningCount !== 2)) cell.classList.add('critical-border');
            }

            cell.addEventListener('click', () => handleDayClick(cell, dayStr));
            calendarGrid.appendChild(cell);
            allGridElements.push(cell);
        }
    }
    
    function handleDayClick(clickedCell, dayStr) {
        const isMobile = window.innerWidth <= 768;
        const oldPopover = document.getElementById('desktop-personal-popover');
        const p = prefixSelect.value.toLowerCase();

        if (currentViewMode === "personal" && p === 'к') return;

        if (clickedCell.classList.contains('selected')) {
            clickedCell.classList.remove('selected');
            expandedPanel.classList.remove('active');
            if (oldPopover) oldPopover.remove();
            return;
        }

        document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
        if (oldPopover) oldPopover.remove();
        clickedCell.classList.add('selected');

        if (isMobile || currentViewMode === "general" || currentViewMode === "booking") {
            expandedPanel.classList.remove('active');
            const cellIndex = allGridElements.indexOf(clickedCell);
            const colIndex = cellIndex % 7;
            const daysToSunday = 6 - colIndex;
            let insertAfterIndex = cellIndex + daysToSunday;

            if (insertAfterIndex >= allGridElements.length) insertAfterIndex = allGridElements.length - 1;
            allGridElements[insertAfterIndex].after(expandedPanel);

            if (currentViewMode === "personal") renderPersonalPanel(dayStr, panelContent);
            else if (currentViewMode === "booking") renderBookingPanel(dayStr, panelContent);
            else renderGeneralPanel(dayStr, panelContent);
            
            expandedPanel.classList.add('active');
        } else {
            expandedPanel.classList.remove('active');
            renderDesktopPersonalDropdown(clickedCell, dayStr);
        }
    }
    
    function getPersonalHtml(dayStr, savedValue) {
        const isDayPreset = savedValue === "14:00 — 18:00";
        const isEveningPreset = savedValue === "18:00 — 22:00" || savedValue === "18:00 -- 22:00";
        const isCustom = savedValue !== "" && !isDayPreset && !isEveningPreset;
        let h1="", m1="", h2="", m2="";
        if (isCustom) {
            const pieces = savedValue.split(/[-—]/);
            if (pieces.length === 2) {
                const t1 = pieces[0].trim().split(':'); const t2 = pieces[1].trim().split(':');
                if (t1.length === 2) { h1 = t1[0]; m1 = t1[1]; }
                if (t2.length === 2) { h2 = t2[0]; m2 = t2[1]; }
            }
        }
        return `
            <div class="panel-title">Смена на ${dayStr}</div>
            <div class="panel-controls">
                <select class="shift-select sub-select">
                    <option value="">-- Выходной --</option>
                    <option value="14:00 — 18:00" ${isDayPreset ? 'selected' : ''}>Дневная (14:00 — 18:00)</option>
                    <option value="18:00 — 22:00" ${isEveningPreset ? 'selected' : ''}>Вечерняя (18:00 — 22:00)</option>
                    <option value="custom" ${isCustom ? 'selected' : ''}>Свой вариант...</option>
                </select>
                <div class="custom-time-inputs sub-custom-box" style="display: ${isCustom ? 'flex' : 'none'};">
                    <input type="text" class="time-part sub-input" data-idx="0" maxlength="2" placeholder="ЧЧ" value="${h1}">:
                    <input type="text" class="time-part sub-input" data-idx="1" maxlength="2" placeholder="ММ" value="${m1}">
                    <span class="time-divider">—</span>
                    <input type="text" class="time-part sub-input" data-idx="2" maxlength="2" placeholder="ЧЧ" value="${h2}">:
                    <input type="text" class="time-part sub-input" data-idx="3" maxlength="2" placeholder="ММ" value="${m2}">
                </div>
            </div>
        `;
    }
    
function setupPersonalListeners(container, dayStr) {
    const selectEl = container.querySelector('.sub-select');
    const customBox = container.querySelector('.sub-custom-box');
    const inputs = Array.from(container.querySelectorAll('.sub-input'));

    const updateLocalData = () => {
        let newVal = selectEl.value;
        if (newVal === 'custom') {
            const v = inputs.map(i => i.value.trim());
            if (v.some(val => val !== "")) {
                const hh1 = (v[0] || '').padStart(2, '0');
                const mm1 = (v[1] || '').padStart(2, '0');
                const hh2 = (v[2] || '').padStart(2, '0');
                const mm2 = (v[3] || '').padStart(2, '0');
                newVal = `${hh1}:${mm1} — ${hh2}:${mm2}`;
            } else {
                // Если выбрали кастом, но поля еще пустые, пишем временную заглушку для визуального контроля
                newVal = "Свой вариант"; 
            }
        }
        
        // Записываем значение в массив для отправки
        pendingShifts[dayStr] = newVal === "Свой вариант" ? "" : newVal;
        
        // ИСПРАВЛЕНИЕ: Обновляем только текст смены внутри ячейки, не ломая структуру и счетчики
        const cell = document.getElementById(`cell-${dayStr}`);
        if (cell) {
            let timeDiv = cell.querySelector('.cell-shift-time');
            if (newVal) {
                if (!timeDiv) {
                    timeDiv = document.createElement('div');
                    timeDiv.className = 'cell-shift-time';
                    cell.appendChild(timeDiv);
                }
                timeDiv.innerText = newVal;
            } else if (timeDiv) {
                timeDiv.remove(); // Если выбран выходной — убираем текст времени
            }
            updateCellVisuals(cell, pendingShifts[dayStr]);
        }
    };

    selectEl.addEventListener('change', () => { 
        customBox.style.display = selectEl.value === 'custom' ? 'flex' : 'none'; 
        updateLocalData(); 
    });
    
    inputs.forEach(input => input.addEventListener('input', updateLocalData));
}

    
    function renderPersonalPanel(dayStr, container) {
        container.innerHTML = getPersonalHtml(dayStr, pendingShifts[dayStr] || "");
        setupPersonalListeners(container, dayStr);
    }
    
    function renderDesktopPersonalDropdown(cell, dayStr) {
        const popover = document.createElement('div');
        popover.id = 'desktop-personal-popover';
        popover.className = 'desktop-popover';
        popover.addEventListener('click', (e) => e.stopPropagation());
        popover.innerHTML = getPersonalHtml(dayStr, pendingShifts[dayStr] || "");
        cell.appendChild(popover);
        setupPersonalListeners(popover, dayStr);
    }
    
    function renderGeneralPanel(dayStr, container) {
        const info = globalGeneralData[dayStr] || { dayAdmins: [], eveningAdmins: [], dayPsychologists: [], eveningPsychologists: [] };
        const isAnalyst = prefixSelect.value.toLowerCase() === 'а';

        const buildPsyList = (arr, isDayShift) => {
            if (!arr.length) return `<li class="psy-list-item">—</li>`;

                let bookingsHtml = "";
                if (isAnalyst) {
                    let defaultHours = isDayShift ? ["14", "15", "16", "17", ""] : ["18", "19", "20", "21", ""];
                    let slotsHtml = "";

                                const clientPart = parts.slice(1).join('—');
                                const subParts = clientPart.split('|');
                                n = subParts[0] ? subParts[0].trim() : clientPart.trim();
                                a = subParts[1] ? subParts[1].trim() : "";
                            } else {
                                n = p.bookings[i];
                            }
                        }
                        
// Добавляем стрелочку после каждой записи, кроме последней
        let arrowHtml = (i < 4) ? `<span class="b-arrow">➔</span>` : "";
        
        slotsHtml += `
            <div class="booking-row general-b-row" data-code="${p.code}" data-name="${p.name}">
                <input type="text" class="booking-input b-hh" placeholder="ЧЧ" maxlength="2" inputmode="numeric" value="${hh}">
                <span>:</span>
                <input type="text" class="booking-input b-mm" placeholder="ММ" maxlength="2" inputmode="numeric" value="${mm}">
                <span>—</span>
                <input type="text" class="booking-input b-name" placeholder="Ник" value="${n}">
                <span>|</span>
                <input type="text" class="booking-input b-age" placeholder="Лет" maxlength="3" type="number" inputmode="numeric" pattern="[0-9]*" value="${a}">
            </div>${arrowHtml}
        `;
    }
    // ДОБАВЛЕН КЛАСС row-mode
    bookingsHtml = `<div class="editable-bookings-container row-mode">${slotsHtml}</div>`;
                } else {
                    if (p.bookings && p.bookings.length > 0) {
                        let itemsHtml = p.bookings.map((b, idx) => {
                            let arrow = idx < p.bookings.length - 1 ? `<span class="b-arrow">➔</span>` : "";
                            return `<span class="b-item">${b}</span>${arrow}`;
                        }).join(' ');
                        bookingsHtml = `<div class="read-only-bookings">${itemsHtml}</div>`;
                    }
                }
                
                return `
                    <li class="psy-list-item">
                        <div class="psy-main-info">${p.name} <span class="role-time">(${p.time})</span></div>
                        ${bookingsHtml}
                    </li>
                `;
            }).join('');
        };

        container.innerHTML = `
            <div class="panel-title">Расписание на ${dayStr}</div>
            <div class="general-details-list">
                <div class="details-section">
                    <div class="section-title">☀️ День</div>
                    <div class="role-group"><span class="role-label">Админ:</span><ul class="role-list">${buildAdminList(info.dayAdmins)}</ul></div>
                    <div class="role-group"><span class="role-label">Психологи:</span><ul class="role-list">${buildPsyList(info.dayPsychologists, true)}</ul></div>
                </div>
                <div class="details-section">
                    <div class="section-title">🌙 Вечер</div>
                    <div class="role-group"><span class="role-label">Админ:</span><ul class="role-list">${buildAdminList(info.eveningAdmins)}</ul></div>
                    <div class="role-group"><span class="role-label">Психологи:</span><ul class="role-list">${buildPsyList(info.eveningPsychologists, false)}</ul></div>
                </div>
            </div>
        `;
        
        if (isAnalyst) {
            const nameInputs = container.querySelectorAll('.b-name');
            nameInputs.forEach(input => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const row = e.target.closest('.booking-row');
                        if (row) { const ageInput = row.querySelector('.b-age'); if (ageInput) ageInput.focus(); }
                    }
                });
            });
        }
    }
    
    btnSave.addEventListener('click', () => {
        loader.style.display = 'block';
        btnSave.disabled = true;

        // МАССОВОЕ СОХРАНЕНИЕ ИЗ ОБЩЕГО РАСПИСАНИЯ ДЛЯ АНАЛИТИКА
        if (currentViewMode === "general") {
            const activeCell = document.querySelector('.calendar-day.selected');
            if(!activeCell) {
                loader.style.display = 'none'; btnSave.disabled = false;
                showToast('Данные сохранены!', 'success'); return;
            }
            
            const dayStr = activeCell.id.replace('cell-', '');
            const rows = document.querySelectorAll('.general-b-row');
            const psychMap = {};
            let validationPassed = true;
            
            rows.forEach(row => {
                const code = row.getAttribute('data-code');
                const name = row.getAttribute('data-name');
                const pId = code || name;
                
                if (!psychMap[pId]) psychMap[pId] = { code: code, name: name, clients: [] };
                
                const hh = row.querySelector('.b-hh').value.trim();
                const mm = row.querySelector('.b-mm').value.trim();
                const n = row.querySelector('.b-name').value.trim();
                const a = row.querySelector('.b-age').value.trim();
                
                if (n || a) {
                    if (!hh || !mm || !n || !a) {
                        validationPassed = false;
                        row.querySelector('.b-hh').style.borderColor = !hh ? 'var(--danger-color)' : '#cbd5e1';
                        row.querySelector('.b-mm').style.borderColor = !mm ? 'var(--danger-color)' : '#cbd5e1';
                        row.querySelector('.b-name').style.borderColor = !n ? 'var(--danger-color)' : '#cbd5e1';
                        row.querySelector('.b-age').style.borderColor = !a ? 'var(--danger-color)' : '#cbd5e1';
                    } else {
                        row.querySelector('.b-hh').style.borderColor = '#cbd5e1';
                        row.querySelector('.b-mm').style.borderColor = '#cbd5e1';
                        row.querySelector('.b-name').style.borderColor = '#cbd5e1';
                        row.querySelector('.b-age').style.borderColor = '#cbd5e1';
                        psychMap[pId].clients.push(`${hh.padStart(2,'0')}:${mm.padStart(2,'0')} — ${n} | ${a}`);
                    }
                } else {
                    row.querySelector('.b-hh').style.borderColor = '#cbd5e1';
                    row.querySelector('.b-mm').style.borderColor = '#cbd5e1';
                    row.querySelector('.b-name').style.borderColor = '#cbd5e1';
                    row.querySelector('.b-age').style.borderColor = '#cbd5e1';
                }
            });
            
            if (!validationPassed) {
                loader.style.display = 'none'; btnSave.disabled = false;
                showToast('Поля Время, Ник и Возраст обязательны для заполнения, вуф!', 'error');
                return;
            }
            
            const bulkData = Object.values(psychMap);
            
            fetch(WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: "saveBulkBookingData", date: dayStr, bulkData: bulkData })
            }).then(res => res.json()).then(data => {
                loader.style.display = 'none'; btnSave.disabled = false;
                if (data.success) {
                    showToast('Массовое расписание обновлено!', 'success');
                    bulkData.forEach(psych => {
                        ["dayPsychologists", "eveningPsychologists"].forEach(listName => {
                            if (globalGeneralData[dayStr][listName]) {
                                let target = globalGeneralData[dayStr][listName].find(p => p.code === psych.code || p.name === psych.name);
                                if (target) target.bookings = psych.clients;
                            }
                        });
                    });
                    expandedPanel.classList.remove('active');
                    renderGrid();
                } else showToast('Ошибка при сохранении: ' + data.error, 'error');
            }).catch(err => {
                loader.style.display = 'none'; btnSave.disabled = false;
                showToast('Ошибка подключения к серверу ❌', 'error');
            });
            
        } 
        // СОХРАНЕНИЕ АБОНЕНТОВ ДЛЯ ПСИХОЛОГА
        else if (currentViewMode === "booking") {
            const activeCell = document.querySelector('.calendar-day.selected');
            if(!activeCell) {
                loader.style.display = 'none'; btnSave.disabled = false;
                showToast('Данные сохранены!', 'success'); return;
            }
            
            const dayStr = activeCell.id.replace('cell-', '');
            const rows = document.querySelectorAll('.booking-row');
            const clientsToSend = [];
            let validationPassed = true;

            rows.forEach(row => {
                const hh = row.querySelector('.b-hh').value.trim(); const mm = row.querySelector('.b-mm').value.trim();
                const name = row.querySelector('.b-name').value.trim(); const age = row.querySelector('.b-age').value.trim();

                if (name || age) {
                    if (!hh || !mm || !name || !age) {
                        validationPassed = false;
                        if (!hh) row.querySelector('.b-hh').style.borderColor = 'var(--danger-color)';
                        if (!mm) row.querySelector('.b-mm').style.borderColor = 'var(--danger-color)';
                        if (!name) row.querySelector('.b-name').style.borderColor = 'var(--danger-color)';
                        if (!age) row.querySelector('.b-age').style.borderColor = 'var(--danger-color)';
                    } else {
                        row.querySelector('.b-hh').style.borderColor = '#cbd5e1'; row.querySelector('.b-mm').style.borderColor = '#cbd5e1';
                        row.querySelector('.b-name').style.borderColor = '#cbd5e1'; row.querySelector('.b-age').style.borderColor = '#cbd5e1';
                        clientsToSend.push(`${hh.padStart(2, '0')}:${mm.padStart(2, '0')} — ${name} | ${age}`);
                    }
                } else {
                    row.querySelector('.b-hh').style.borderColor = '#cbd5e1'; row.querySelector('.b-mm').style.borderColor = '#cbd5e1';
                    row.querySelector('.b-name').style.borderColor = '#cbd5e1'; row.querySelector('.b-age').style.borderColor = '#cbd5e1';
                }
            });
            
            if(!validationPassed) {
                loader.style.display = 'none'; btnSave.disabled = false;
                showToast('Поля Время, Ник и Возраст обязательны для заполнения, вуф!', 'error'); return;
            }

            let saveTargetCode = currentFullCode;
            if (prefixSelect.value.toLowerCase() === 'а' && window.currentSelectedExpertCode) {
                saveTargetCode = window.currentSelectedExpertCode;
            }
            
            fetch(WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: "saveBookingData", code: saveTargetCode, date: dayStr, clients: clientsToSend })
            }).then(res => res.json()).then(data => {
                loader.style.display = 'none'; btnSave.disabled = false;
                if (data.success) {
                    showToast('Абоненты успешно помечены!', 'success');
                    if(!globalGeneralData.bookings) globalGeneralData.bookings = {};
                    globalGeneralData.bookings[dayStr] = clientsToSend;
                    expandedPanel.classList.remove('active');
                    renderGrid(); 
                } else showToast('Ошибка при сохранении: ' + data.error, 'error');
            }).catch(err => {
                loader.style.display = 'none'; btnSave.disabled = false;
                showToast('Ошибка подключения к серверу ❌', 'error');
            });
        } 
        // СОХРАНЕНИЕ СМЕН В ИЮЛЕ
        else {
            fetch(WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ code: currentFullCode, shifts: pendingShifts })
            }).then(res => res.json()).then(data => {
                loader.style.display = 'none'; btnSave.disabled = false;
                if (data.success) showToast('Данные успешно сохранены, ауф!', 'success');
                else showToast('Ошибка: Сотрудник не найден.', 'error');
            }).catch(err => {
                loader.style.display = 'none'; btnSave.disabled = false;
                showToast('Сбой при сохранении данных ❌', 'error');
            });
        }
    });
    
    function renderBookingPanel(dayStr, container) {
        const currentShift = pendingShifts[dayStr] || "";

        if (!currentShift || currentShift === "") {
            container.innerHTML = `
                <div class="panel-title" style="color:var(--danger-color)">Смена отсутствует</div>
                <div style="font-weight:700; margin-bottom:10px; color:#64748b;">Нужно записаться на смену и перезагрузить страницу:</div>
                <select class="shift-select booking-fallback-select" style="border-color:var(--danger-color)">
                    <option value="">-- Выберите смену --</option>
                    <option value="14:00 — 18:00">Дневная (14:00 — 18:00)</option>
                    <option value="18:00 — 22:00">Вечерняя (18:00 — 22:00)</option>
                    <option value="custom">Свой вариант...</option>
                </select>
            `;
            container.querySelector('.booking-fallback-select').addEventListener('change', (e) => {
                if(e.target.value !== "") {
                    pendingShifts[dayStr] = e.target.value;
                    updateCellVisuals(document.getElementById(`cell-${dayStr}`), e.target.value);
                    renderBookingPanel(dayStr, container);
                }
            });
            return;
        }

        let defaultHours = ["", "", "", ""];
        let defaultMinutes = "00";
        if (currentShift === "14:00 — 18:00") defaultHours = ["14", "15", "16", "17"];
        else if (currentShift === "18:00 — 22:00" || currentShift === "18:00 -- 22:00") defaultHours = ["18", "19", "20", "21"];

        const savedClients = globalGeneralData.bookings ? (globalGeneralData.bookings[dayStr] || []) : [];
        let html = `<div class="panel-title">Запись абонентов на ${dayStr} (${currentShift || 'Выбор специалиста'})</div>`;

        for (let i = 0; i < 5; i++) {
            let hh = defaultHours[i] || ""; let mm = hh ? defaultMinutes : "";
            let n = "", a = ""; 

            if (savedClients[i]) {
                const parts = savedClients[i].split(/[—–-]/);
                if (parts.length >= 2) {
                    const timeSplit = parts[0].trim().split(':');
                    if (timeSplit.length === 2) { hh = timeSplit[0].trim(); mm = timeSplit[1].trim(); }
                    const clientPart = parts.slice(1).join('—');
                    const subParts = clientPart.split('|');
                    n = subParts[0] ? subParts[0].trim() : clientPart.trim();
                    a = subParts[1] ? subParts[1].trim() : "";
                } else n = savedClients[i];
            }

html += `
        <div class="booking-row" data-row="${i}">
            <input type="text" class="booking-input b-hh" placeholder="ЧЧ" maxlength="2" inputmode="numeric" value="${hh}">
            <span>:</span>
            <input type="text" class="booking-input b-mm" placeholder="ММ" maxlength="2" inputmode="numeric" value="${mm}">
            <span>—</span>
            <input type="text" class="booking-input b-name" placeholder="Ник абонента" value="${n}">
            <span>|</span>
            <input type="text" class="booking-input b-age" placeholder="Возраст" maxlength="3" type="number" inputmode="numeric" pattern="[0-9]*" value="${a}">
        </div>
    `;
        }
        
        container.innerHTML = html;
        const nameInputs = container.querySelectorAll('.b-name');
        nameInputs.forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const row = e.target.closest('.booking-row');
                    if (row) { const ageInput = row.querySelector('.b-age'); if (ageInput) ageInput.focus(); }
                }
            });
        });
    }
    
    document.getElementById('btn-global-load-expert').addEventListener('click', () => {
        const expertVal = document.getElementById('global-expert-input').value.trim();
        if (!expertVal) { showToast('Введите ник или код психолога!', 'error'); return; }
        expandedPanel.classList.remove('active');
        document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
        removeDesktopPopover();
        window.currentSelectedExpertCode = expertVal;
        loadCalendarData(`${WEB_APP_URL}?action=getBookingData&code=${encodeURIComponent(expertVal)}`);
    });
    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker зарегистрирован!'))
        .catch((err) => console.log('Ошибка SW:', err));
    }
</script>
</body>
</html>
